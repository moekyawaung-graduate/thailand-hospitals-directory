<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f8fc;
      color: #1f2937;
      display: grid;
      place-items: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
    }
    .box {
      background: white;
      border: 1px solid #dbe4f0;
      border-radius: 14px;
      padding: 24px;
      max-width: 520px;
    }
    a {
      color: #0f62fe;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>You are offline</h1>
    <p>This page is not currently available offline.</p>
    <p>Please reconnect to the internet and try again.</p>
    <p><a href="./index.html">Go back home</a></p>
  </div>
</body>
</html>
